<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Login</h1>
  <p>Access your account</p>
</header>

<div class="container register-form" style="max-width: 400px;">
  <form id="loginForm">

    <input type="text" id="phone" placeholder="Phone Number *" required>

    <input type="password" id="password" placeholder="Password *" required>

    <button type="submit" class="btn">Login</button>

    <p style="text-align:center; margin-top:10px;">
      Don’t have an account ?
      <a href="register.html" style="color:#4CAF50; font-weight:600;">Register</a>
    </p>

    <p id="msg"></p>
    
    <p style="text-align:center; margin-top:8px;">
      <a href="forgot.html" style="color:red;">Forgot Password?</a>
    </p>
  </form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!phone || !password) {
    document.getElementById("msg").innerText = "Please fill all required fields";
    return;
  }

  try {
    const res = await fetch("https://play-backend-xa7x.onrender.com/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ phone, password })
    });

    const data = await res.json();

    // 🔥 FIXED CONDITION
    if (data.user) {
      localStorage.setItem("user", JSON.stringify(data.user));
      localStorage.setItem("user_id", data.user.id);   

      document.getElementById("msg").innerText = "Login successful";

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 500);

    } else {
      document.getElementById("msg").innerText = data.message;
    }

  } catch (err) {
    document.getElementById("msg").innerText = "Server error";
  }
});
</script>

</body>
</html>
