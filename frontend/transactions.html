<!DOCTYPE html>
<html>
<head>
  <title>Transaction History</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #f5f5f5;
      font-weight: bold;
    }

    tr:hover {
      background: #f9f9f9;
    }

    .deposit { color: green; font-weight: bold; }
    .withdraw { color: red; font-weight: bold; }

    .pending { color: orange; }
    .approved { color: green; }
    .rejected { color: red; }
  </style>
</head>
<body>

<header>
  <h1>Play and Earn</h1>
</header>

<div class="container">
  <h2>Transaction History</h2>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Amount</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="txnTable">
      <tr><td colspan="4">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "login.html";

function loadTransactions() {
  fetch(`https://play-backend-xa7x.onrender.com/api/wallet/transactions/${user.id}`)
    .then(res => res.json())
    .then(data => {

      const table = document.getElementById("txnTable");
      table.innerHTML = "";

      if (!data || data.length === 0) {
        table.innerHTML = `<tr><td colspan="4">No transactions found</td></tr>`;
        return;
      }

      data.forEach(txn => {

        const typeClass = txn.type.toLowerCase();
        const statusClass = txn.status.toLowerCase();

        table.innerHTML += `
          <tr>
            <td>${new Date(txn.created_at).toLocaleString()}</td>
            <td class="${typeClass}">${txn.type}</td>
            <td>${txn.amount}</td>
            <td class="${statusClass}">${txn.status}</td>
          </tr>
        `;
      });
    });
}

loadTransactions();
</script>

</body>
</html>
