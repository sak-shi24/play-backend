<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>
<link rel="stylesheet" href="css/style.css">

<style>
.box{
  max-width:400px;
  margin:80px auto;
  background:#fff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:6px;
}
button{
  width:100%;
  padding:12px;
  background:#28a745;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
button:hover{ background:#218838; }
#resetBox{ display:none; }
.msg{ text-align:center; margin-top:10px; font-weight:600; }
</style>
</head>

<body>

<div class="box">
  <h2 style="text-align:center;">Forgot Password</h2>

  <!-- PHONE -->
  <input id="phone" placeholder="Enter Phone Number">
  <button onclick="checkUser()">Verify</button>

  <!-- RESET -->
  <div id="resetBox">
    <input type="password" id="password" placeholder="New Password">
    <input type="password" id="cpassword" placeholder="Confirm Password">
    <button onclick="resetPassword()">Update Password</button>
  </div>

  <p class="msg" id="msg"></p>
</div>

<script>
let verifiedPhone = "";

// ✅ CHECK USER
async function checkUser(){
  const phone = document.getElementById("phone").value.trim();

  if(!phone){
    msg.innerText="Enter phone number";
    return;
  }

  const res = await fetch("https://play-backend-23rs.onrender.com/api/auth/check-user",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ phone })
  });

  const data = await res.json();

  if(data.success){
    verifiedPhone = phone;
    document.getElementById("resetBox").style.display="block";
    msg.innerText="User verified ✔";
  }else{
    msg.innerText=data.message;
  }
}

// ✅ RESET PASSWORD
async function resetPassword(){
  const password = document.getElementById("password").value;
  const cpassword = document.getElementById("cpassword").value;

  if(password.length < 4){
    msg.innerText="Password must be 4+ characters";
    return;
  }

  if(password !== cpassword){
    msg.innerText="Passwords do not match";
    return;
  }

  const res = await fetch("https://play-backend-23rs.onrender.com/api/auth/reset-password",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ phone: verifiedPhone, password })
  });

  const data = await res.json();

  if(data.success){
    msg.innerText="Password updated ✔ Redirecting...";
    setTimeout(()=>{
      window.location.href="login.html";
    },1000);
  }else{
    msg.innerText=data.message;
  }
}

const msg = document.getElementById("msg");
</script>

</body>
</html>
