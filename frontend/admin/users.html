<!DOCTYPE html>
<html>
<head>
  <title>Users List</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #eef1f5;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #28a745;
      color: white;
      padding: 15px 30px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    header button {
      background: #fff;
      color: #28a745;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    header button:hover {
      background: #f0f0f0;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    th, td {
      padding: 12px 15px;
      text-align: left;
    }

    th {
      background: #28a745;
      color: white;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    tr:hover {
      background: #d4edda;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>Users List</h1>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">
  <table id="usersTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Mobile</th>
        <th>Wallet</th>
        <th>Created At</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td colspan="4" style="text-align:center;">Loading...</td>
      </tr>
    </tbody>
  </table>
</div>

<script src="../admin/admin.js"></script>
</body>
</html>
