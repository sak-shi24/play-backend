<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Help & Support</title>
  <link rel="stylesheet" href="css/style.css">
<style>
body{
  font-family: Arial;
  background: #eef1f5;
  margin: 0;
  padding: 0;
}

header{
  background:#28a745;
  color:white;
  padding:20px;
  text-align:center;
}

.container{
  width:90%;
  max-width:600px;
  margin:40px auto;
  background:white;
  padding:20px;
  border-radius:8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  color:#28a745;
}

button{
  padding:12px 20px;
  margin:10px 5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
  color:white;
}

button.call{
  background:#28a745;
}

button.whatsapp{
  background:#28a745;
}

form{
  margin-top:20px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
  box-sizing: border-box;
  font-size:14px;
}

input[type="submit"]{
  background:#28a745;
  color:white;
  border:none;
  cursor:pointer;
}

input[type="submit"]:hover{
  opacity:0.9;
}
</style>
</head>
<body>
<header>
  <h1>Play and Earn</h1>
</header>


<h2>Help & Support</h2>

<div class="container">
  <h2>Contact Us</h2>
  
  <p>If you have any issue, you can contact us via Call or WhatsApp:</p>
  
  <div style="text-align:center;">
    <a href="tel:+919602935329"><button class="call">Call Support</button></a>
    <a href="https://wa.me/919602935329" target="_blank"><button class="whatsapp">WhatsApp</button></a>
  </div>
  
  <hr>
  
  <h3>Or send us a message:</h3>
  <form>
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Your name">

    <label for="email">Email / Phone</label>
    <input type="text" id="email" name="email" placeholder="Your email or phone">

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" placeholder="Describe your issue"></textarea>

    <input type="submit" value="Submit">
  </form>
</div>
<script>
document.querySelector("form").addEventListener("submit", async function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const contact = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  const res = await fetch("https://play-backend-xa7x.onrender.com/api/wallet/help-request", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, contact, message })
  });

  const data = await res.json();
  alert(data.message);

  this.reset();
});
</script>

</body>
</html>
